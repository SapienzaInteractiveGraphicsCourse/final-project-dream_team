<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Door Minigame Test</title>
  <style>
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      color: #f7fbff;
      background: #111820;
      font-family: Arial, sans-serif;
    }

    main {
      width: min(520px, calc(100vw - 32px));
    }

    h1 {
      margin: 0 0 12px;
      color: #ffcf6c;
      font-size: 34px;
    }

    p {
      margin: 0 0 18px;
      color: #fff1ce;
      font-size: 17px;
      line-height: 1.45;
    }

    .test-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    button {
      padding: 12px 16px;
      color: #111820;
      background: #ffcf6c;
      border: 0;
      border-radius: 7px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover,
    button:focus-visible {
      background: #ffe29b;
    }

    #result-message {
      min-height: 24px;
      margin-top: 18px;
      color: #8ce99a;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main>
    <h1>Door Minigame Test</h1>
    <p>Choose a difficulty and repeat the sequence shown by the magic door.</p>
    <div class="test-controls">
      <button type="button" data-difficulty="easy">Easy</button>
      <button type="button" data-difficulty="medium">Medium</button>
      <button type="button" data-difficulty="hard">Hard</button>
    </div>
    <div id="result-message"></div>
  </main>

  <script type="module">
    import { createDoorMinigame } from './door.js';

    const resultMessage = document.getElementById('result-message');
    const doorMinigame = createDoorMinigame({
      allowClose: true,
      onSolved: ({ difficulty, sequenceLength }) => {
        resultMessage.textContent = `Door opened on ${difficulty} with ${sequenceLength} keys.`;
      },
      onClose: () => {
        resultMessage.textContent = '';
      }
    });

    document.querySelectorAll('[data-difficulty]').forEach((button) => {
      button.addEventListener('click', () => {
        resultMessage.textContent = '';
        doorMinigame.open(button.dataset.difficulty);
      });
    });
  </script>
</body>
</html>
